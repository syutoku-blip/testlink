<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顧客状況分析ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1f2d45;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --accent4: #f59e0b;
    --accent5: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Noto Sans JP', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,14,26,0.95);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.02em;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
  }

  .header-stats {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .hstat {
    text-align: right;
  }

  .hstat-val {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
  }

  .hstat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* Nav */
  nav {
    display: flex;
    gap: 4px;
    padding: 12px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .nav-btn {
    padding: 6px 16px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--sans);
    font-size: 13px;
    transition: all 0.15s;
  }

  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: var(--accent); color: #000; font-weight: 600; }

  /* Main layout */
  .main { padding: 24px 32px; max-width: 1600px; margin: 0 auto; }

  /* Page sections */
  .page { display: none; }
  .page.active { display: block; }

  /* Section title */
  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* KPI grid */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .kpi-card:hover { border-color: var(--accent); }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--card-accent, var(--accent));
  }

  .kpi-icon {
    font-size: 20px;
    margin-bottom: 8px;
    display: block;
  }

  .kpi-val {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }

  .kpi-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .kpi-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    margin-top: 8px;
  }

  /* Chart area */
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 32px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .chart-title {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  canvas { width: 100% !important; }

  /* Table */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .table-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .table-title {
    font-size: 13px;
    font-weight: 600;
  }

  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    min-width: 220px;
  }

  .search-box input {
    background: none;
    border: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    width: 100%;
  }

  .search-box input::placeholder { color: var(--muted); }

  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    padding: 10px 16px;
    text-align: left;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }

  th:hover { color: var(--accent); }
  th.sorted { color: var(--accent); }

  td {
    padding: 10px 16px;
    border-bottom: 1px solid rgba(31,45,69,0.5);
    font-size: 13px;
    white-space: nowrap;
  }

  tr:last-child td { border-bottom: none; }

  tr:hover td { background: rgba(0,212,255,0.04); }

  .member-id {
    font-family: var(--mono);
    color: var(--accent);
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
  }

  .member-id:hover { text-decoration: underline; }

  .num { text-align: right; font-family: var(--mono); }

  .positive { color: var(--accent3); }
  .negative { color: var(--accent5); }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    font-family: var(--mono);
  }

  .badge-blue { background: rgba(0,212,255,0.1); color: var(--accent); }
  .badge-green { background: rgba(16,185,129,0.1); color: var(--accent3); }
  .badge-amber { background: rgba(245,158,11,0.1); color: var(--accent4); }
  .badge-red { background: rgba(239,68,68,0.1); color: var(--accent5); }

  .pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
  }

  .page-btns { display: flex; gap: 4px; }

  .page-btn {
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12px;
  }

  .page-btn:hover, .page-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* Member Detail */
  .detail-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }

  .back-btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .back-btn:hover { background: var(--surface2); color: var(--text); }

  .detail-id {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
  }

  .detail-kpi {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .detail-kpi-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }

  .detail-kpi-val {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }

  .detail-kpi-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  .detail-charts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  /* Search member input on member page */
  .member-search-area {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    align-items: center;
  }

  .member-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    outline: none;
    width: 200px;
    transition: border-color 0.15s;
  }

  .member-input:focus { border-color: var(--accent); }

  .search-btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #000;
    font-weight: 700;
    cursor: pointer;
    font-size: 14px;
    transition: opacity 0.15s;
  }

  .search-btn:hover { opacity: 0.85; }

  .autocomplete-list {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 50;
    margin-top: 4px;
  }

  .autocomplete-item {
    padding: 8px 16px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 13px;
  }

  .autocomplete-item:hover { background: var(--border); color: var(--accent); }

  .input-wrap { position: relative; }

  /* Mini bar chart */
  .mini-chart {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 24px;
  }

  .mini-bar {
    flex: 1;
    background: var(--accent);
    opacity: 0.6;
    border-radius: 1px;
    min-height: 1px;
    transition: opacity 0.15s;
  }

  .mini-bar:hover { opacity: 1; }

  /* Sparkline SVG */
  .spark { display: block; }

  /* Sort indicator */
  .sort-indicator { margin-left: 4px; opacity: 0.5; }

  .status-filter-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .status-filter-btn:hover { background: var(--surface2); color: var(--text); }
  .status-filter-btn.active[data-status="all"] { background: var(--accent); color: #000; border-color: var(--accent); }
  .status-filter-btn.active[data-status="active"] { background: var(--accent3); color: #000; border-color: var(--accent3); }
  .status-filter-btn.active[data-status="withdrawn"] { background: var(--accent5); color: #fff; border-color: var(--accent5); }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
    color: var(--muted);
    gap: 12px;
  }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .rank-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
  }

  .fade-in {
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .error-msg {
    padding: 20px;
    text-align: center;
    color: var(--accent5);
    font-size: 14px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  @media (max-width: 900px) {
    .chart-grid, .detail-charts { grid-template-columns: 1fr; }
    .header-stats { display: none; }
    .main { padding: 16px; }
  }
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo">
    <div class="logo-icon">📊</div>
    <div>
      <div class="logo-text">顧客状況分析</div>
      <div class="logo-sub">2024年11月以降・全項目</div>
    </div>
  </div>
  <div class="header-stats" id="headerStats">
    <div class="hstat">
      <div class="hstat-val" id="hs-members">—</div>
      <div class="hstat-label">会員数</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="hs-deposit">—</div>
      <div class="hstat-label">入金合計</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="hs-shipping">—</div>
      <div class="hstat-label">配送費合計</div>
    </div>
  </div>
</header>

<nav>
  <button class="nav-btn active" onclick="showPage('overview')">📈 概要</button>
  <button class="nav-btn" onclick="showPage('members')">👥 会員一覧</button>
  <button class="nav-btn" onclick="showPage('detail')">🔍 会員詳細</button>
</nav>

<div class="main">

  <!-- OVERVIEW PAGE -->
  <div class="page active" id="page-overview">
    <div class="section-title">KPI サマリー</div>
    <div class="kpi-grid" id="kpiGrid"></div>

    <div class="section-title">月別推移</div>
    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title"><span>SLC-US費 月別推移</span><span style="color:var(--accent);font-family:var(--mono)" id="slcus-total">—</span></div>
        <canvas id="chart-slcus" height="200"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title"><span>入金額 月別推移</span><span style="color:var(--accent3);font-family:var(--mono)" id="deposit-total">—</span></div>
        <canvas id="chart-deposit" height="200"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title"><span>配送費 月別推移</span><span style="color:var(--accent4);font-family:var(--mono)" id="shipping-total">—</span></div>
        <canvas id="chart-shipping" height="200"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title"><span>通関費 月別推移</span><span style="color:var(--accent2);font-family:var(--mono)" id="customs-total">—</span></div>
        <canvas id="chart-customs" height="200"></canvas>
      </div>
    </div>

    <div class="section-title">上位会員（入金額）</div>
    <div class="table-card">
      <div class="table-wrap">
        <table id="top-members-table">
          <thead>
            <tr>
              <th>会員番号</th>
              <th class="num">入金額</th>
              <th class="num">配送費</th>
              <th class="num">SLC-US費</th>
              <th class="num">通関費</th>
              <th class="num">支払補償</th>
            </tr>
          </thead>
          <tbody id="top-members-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- MEMBERS PAGE -->
  <div class="page" id="page-members">
    <div class="table-card">
      <div class="table-header">
        <div class="table-title">会員一覧 <span id="member-count" style="color:var(--muted);font-size:12px;margin-left:8px"></span></div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <div style="display:flex;gap:4px">
            <button class="status-filter-btn active" data-status="all" onclick="setStatusFilter('all',this)">全員</button>
            <button class="status-filter-btn" data-status="active" onclick="setStatusFilter('active',this)">現会員</button>
            <button class="status-filter-btn" data-status="withdrawn" onclick="setStatusFilter('withdrawn',this)">退会者</button>
          </div>
          <div class="search-box">
            <span>🔍</span>
            <input type="text" id="member-search-input" placeholder="会員番号で検索..." oninput="filterMembers()">
          </div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th onclick="sortMembers('status')">ステータス <span class="sort-indicator">↕</span></th>
              <th onclick="sortMembers('id')">会員番号 <span class="sort-indicator">↕</span></th>
              <th class="num" onclick="sortMembers('deposit')">入金額 <span class="sort-indicator">↕</span></th>
              <th class="num" onclick="sortMembers('shipping')">配送費 <span class="sort-indicator">↕</span></th>
              <th class="num" onclick="sortMembers('slcus')">SLC-US費 <span class="sort-indicator">↕</span></th>
              <th class="num" onclick="sortMembers('customs')">通関費 <span class="sort-indicator">↕</span></th>
              <th class="num" onclick="sortMembers('compensation')">支払補償 <span class="sort-indicator">↕</span></th>
              <th class="num" onclick="sortMembers('stock')">在庫件数 <span class="sort-indicator">↕</span></th>
              <th>SLC-US推移</th>
            </tr>
          </thead>
          <tbody id="members-tbody"></tbody>
        </table>
      </div>
      <div class="pagination">
        <span id="pagination-info"></span>
        <div class="page-btns" id="pagination-btns"></div>
      </div>
    </div>
  </div>

  <!-- DETAIL PAGE -->
  <div class="page" id="page-detail">
    <div class="member-search-area">
      <div class="input-wrap">
        <input class="member-input" type="text" id="detail-input" placeholder="会員番号を入力"
          oninput="autocomplete(this.value)" onkeydown="if(event.key==='Enter')searchDetail()">
        <div class="autocomplete-list" id="autocomplete-list" style="display:none"></div>
      </div>
      <button class="search-btn" onclick="searchDetail()">🔍 検索</button>
    </div>

    <div id="detail-content">
      <div style="text-align:center;padding:60px;color:var(--muted)">
        <div style="font-size:40px;margin-bottom:12px">🔍</div>
        <div>会員番号を入力して検索してください</div>
      </div>
    </div>
  </div>

</div><!-- .main -->

<script>
// ===== Chart.js CDN =====
const CHART_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';

let chartLib = null;
let charts = {};

function loadCharts(cb) {
  if (chartLib) { cb(); return; }
  const s = document.createElement('script');
  s.src = CHART_CDN;
  s.onload = () => { chartLib = true; cb(); };
  document.head.appendChild(s);
}

// ===== State =====
let currentPage = 'overview';
let membersFiltered = [];
let membersSorted = { col: 'deposit', dir: -1 };
let currentMemberPage = 1;
const PAGE_SIZE = 30;

// ===== Utility =====
function fmt(n, compact) {
  if (n == null) return '—';
  const abs = Math.abs(n);
  if (compact) {
    if (abs >= 1e8) return (n/1e8).toFixed(1) + '億';
    if (abs >= 1e4) return (n/1e4).toFixed(0) + '万';
    return n.toLocaleString();
  }
  return n.toLocaleString('ja-JP');
}

function fmtCompact(n) {
  if (n == null) return '—';
  const abs = Math.abs(n);
  if (abs >= 1e8) return (n/1e8).toFixed(1) + '億';
  if (abs >= 1e4) return Math.round(n/1e4) + '万';
  return n.toLocaleString();
}

function colorClass(n) {
  if (n == null || n === 0) return '';
  return n > 0 ? 'positive' : 'negative';
}

function moSum(arr) {
  return (arr || []).reduce((a, v) => a + (v || 0), 0);
}

function sparkline(arr, color) {
  const vals = arr.filter(v => v != null);
  if (!vals.length) return '';
  const max = Math.max(...vals.map(Math.abs));
  if (max === 0) return '';
  const bars = arr.map(v => {
    const h = v == null ? 0 : Math.round((Math.abs(v) / max) * 20);
    const c = v < 0 ? '#ef4444' : color;
    return `<div class="mini-bar" style="height:${Math.max(h,1)}px;background:${c}"></div>`;
  });
  return `<div class="mini-chart">${bars.join('')}</div>`;
}

// ===== Aggregate data =====
function buildAggMonthly() {
  const slcus = new Array(MONTHS.length).fill(0);
  const deposit = new Array(MONTHS.length).fill(0);
  const shipping = new Array(MONTHS.length).fill(0);
  const customs = new Array(MONTHS.length).fill(0);
  const payment = new Array(MONTHS.length).fill(0);

  for (const mid of MEMBER_IDS) {
    const m = MEMBERS[mid];
    if (!m) continue;
    MONTHS.forEach((_, i) => {
      slcus[i] += m.sl[i] || 0;
      deposit[i] += m.da[i] || 0;
      shipping[i] += m.sc[i] || 0;
      customs[i] += m.cc[i] || 0;
      payment[i] += m.pa[i] || 0;
    });
  }
  return { slcus, deposit, shipping, customs, payment };
}

// ===== Page navigation =====
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event && event.target && event.target.classList.add('active');
  if (name === 'overview' && !charts['slcus']) renderOverview();
  if (name === 'members') renderMembers();
  currentPage = name;
}

// ===== Overview =====
function renderOverview() {
  const agg = buildAggMonthly();
  const totalDeposit = agg.deposit.reduce((a,b) => a+b, 0);
  const totalShipping = agg.shipping.reduce((a,b) => a+b, 0);
  const totalSLCUS = agg.slcus.reduce((a,b) => a+b, 0);
  const totalCustoms = agg.customs.reduce((a,b) => a+b, 0);
  const totalPayment = agg.payment.reduce((a,b) => a+b, 0);

  // Header stats
  document.getElementById('hs-members').textContent = MEMBER_IDS.length + '名';
  document.getElementById('hs-deposit').textContent = fmtCompact(totalDeposit);
  document.getElementById('hs-shipping').textContent = fmtCompact(totalShipping);

  // KPI cards
  const activeCount = MEMBER_IDS.filter(m => !MEMBER_STATUS[m]).length;
  const withdrawnCount = MEMBER_IDS.filter(m => MEMBER_STATUS[m] === true).length;
  const kpis = [
    { icon: '👥', val: MEMBER_IDS.length + '名', label: '総会員数', sub: `現会員 ${activeCount}名 / 退会 ${withdrawnCount}名`, accent: 'var(--accent)' },
    { icon: '💰', val: fmtCompact(totalDeposit) + '円', label: '入金合計', sub: '全期間', accent: 'var(--accent3)' },
    { icon: '📦', val: fmtCompact(totalShipping) + '円', label: '配送費合計', sub: '全期間', accent: 'var(--accent4)' },
    { icon: '🛃', val: fmtCompact(totalCustoms) + '円', label: '通関費合計', sub: '全期間', accent: 'var(--accent2)' },
    { icon: '🏭', val: fmtCompact(totalSLCUS) + '円', label: 'SLC-US費合計', sub: '全期間', accent: 'var(--accent)' },
    { icon: '💸', val: fmtCompact(totalPayment) + '円', label: '支払補償合計', sub: totalPayment < 0 ? '返金超過' : '支払超過', accent: totalPayment < 0 ? 'var(--accent5)' : 'var(--accent3)' },
  ];

  document.getElementById('kpiGrid').innerHTML = kpis.map(k =>
    `<div class="kpi-card" style="--card-accent:${k.accent}">
      <span class="kpi-icon">${k.icon}</span>
      <div class="kpi-val">${k.val}</div>
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>`
  ).join('');

  document.getElementById('slcus-total').textContent = fmtCompact(totalSLCUS) + '円';
  document.getElementById('deposit-total').textContent = fmtCompact(totalDeposit) + '円';
  document.getElementById('shipping-total').textContent = fmtCompact(totalShipping) + '円';
  document.getElementById('customs-total').textContent = fmtCompact(totalCustoms) + '円';

  // Top members table
  const tops = MEMBER_IDS
    .filter(m => m !== '合計')
    .sort((a, b) => (MEMBERS[b]?.s?.['入金額'] || 0) - (MEMBERS[a]?.s?.['入金額'] || 0))
    .slice(0, 15);

  // Actually sort by total deposit
  const byDeposit = MEMBER_IDS.map(mid => ({
    mid,
    deposit: moSum(MEMBERS[mid]?.da),
    shipping: MEMBERS[mid]?.s?.['配送費'] || 0,
    slcus: MEMBERS[mid]?.s?.['SLC費'] || 0,
    customs: MEMBERS[mid]?.s?.['通関費'] || 0,
    comp: MEMBERS[mid]?.s?.['補償額'] || 0,
  })).sort((a,b) => b.deposit - a.deposit).slice(0, 15);

  document.getElementById('top-members-body').innerHTML = byDeposit.map((r, i) =>
    `<tr>
      <td><span class="rank-dot" style="background:${['#ffd700','#c0c0c0','#cd7f32'][i]||'var(--border)'}"></span>
        <span class="member-id" onclick="goDetail('${r.mid}')">${r.mid}</span></td>
      <td class="num positive">${fmt(r.deposit)}</td>
      <td class="num">${fmt(r.shipping)}</td>
      <td class="num">${fmt(r.slcus)}</td>
      <td class="num">${fmt(r.customs)}</td>
      <td class="num ${colorClass(r.comp)}">${fmt(r.comp)}</td>
    </tr>`
  ).join('');

  // Charts
  loadCharts(() => {
    const chartOpts = (color) => ({
      type: 'bar',
      options: {
        responsive: true,
        animation: { duration: 600 },
        plugins: { legend: { display: false }, tooltip: {
          callbacks: { label: ctx => '  ¥' + ctx.raw.toLocaleString('ja-JP') }
        }},
        scales: {
          x: { grid: { color: 'rgba(31,45,69,0.6)' }, ticks: { color: '#64748b', font: { size: 9 }, maxRotation: 45 } },
          y: { grid: { color: 'rgba(31,45,69,0.6)' }, ticks: {
            color: '#64748b', font: { size: 9 },
            callback: v => fmtCompact(v)
          }}
        }
      },
      data: {
        labels: MONTHS,
        datasets: [{ data: [], backgroundColor: color + '99', borderColor: color, borderWidth: 1, borderRadius: 3 }]
      }
    });

    const makeChart = (id, data, color) => {
      if (charts[id]) charts[id].destroy();
      const cfg = chartOpts(color);
      cfg.data.datasets[0].data = data;
      charts[id] = new Chart(document.getElementById(id), cfg);
    };

    makeChart('chart-slcus', agg.slcus, '#00d4ff');
    makeChart('chart-deposit', agg.deposit, '#10b981');
    makeChart('chart-shipping', agg.shipping, '#f59e0b');
    makeChart('chart-customs', agg.customs, '#7c3aed');
  });
}

// ===== Members list =====
let currentStatusFilter = 'all';

function setStatusFilter(status, btn) {
  currentStatusFilter = status;
  document.querySelectorAll('.status-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentMemberPage = 1;
  renderMembers();
}

function getFilteredMembers() {
  const q = document.getElementById('member-search-input')?.value?.trim().toLowerCase() || '';
  let list = MEMBER_IDS.filter(m => m !== '合計');
  if (currentStatusFilter === 'active') list = list.filter(m => !MEMBER_STATUS[m]);
  else if (currentStatusFilter === 'withdrawn') list = list.filter(m => MEMBER_STATUS[m] === true);
  if (q) list = list.filter(m => m.toLowerCase().includes(q));

  const col = membersSorted.col;
  const dir = membersSorted.dir;

  list.sort((a, b) => {
    let va, vb;
    const ma = MEMBERS[a], mb = MEMBERS[b];
    if (col === 'status') {
      va = MEMBER_STATUS[a] ? 1 : 0; vb = MEMBER_STATUS[b] ? 1 : 0;
      return dir * (va - vb);
    } else if (col === 'id') { va = a; vb = b; return dir * va.localeCompare(vb, 'ja'); }
    if (col === 'deposit') { va = moSum(ma?.da); vb = moSum(mb?.da); }
    else if (col === 'shipping') { va = ma?.s?.['配送費'] || 0; vb = mb?.s?.['配送費'] || 0; }
    else if (col === 'slcus') { va = ma?.s?.['SLC費'] || 0; vb = mb?.s?.['SLC費'] || 0; }
    else if (col === 'customs') { va = ma?.s?.['通関費'] || 0; vb = mb?.s?.['通関費'] || 0; }
    else if (col === 'compensation') { va = ma?.s?.['補償額'] || 0; vb = mb?.s?.['補償額'] || 0; }
    else if (col === 'stock') { va = ma?.s?.['在庫件数'] || 0; vb = mb?.s?.['在庫件数'] || 0; }
    else { va = 0; vb = 0; }
    return dir * (va - vb);
  });

  return list;
}

function renderMembers() {
  membersFiltered = getFilteredMembers();
  const total = membersFiltered.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  if (currentMemberPage > totalPages) currentMemberPage = 1;

  const start = (currentMemberPage - 1) * PAGE_SIZE;
  const pageItems = membersFiltered.slice(start, start + PAGE_SIZE);

  document.getElementById('member-count').textContent = `(${total}名)`;

  const tbody = document.getElementById('members-tbody');
  tbody.innerHTML = pageItems.map(mid => {
    const m = MEMBERS[mid];
    if (!m) return '';
    const deposit = moSum(m.da);
    const shipping = m.s['配送費'] || 0;
    const slcus = m.s['SLC費'] || 0;
    const customs = m.s['通関費'] || 0;
    const comp = m.s['補償額'] || 0;
    const stock = m.s['在庫件数'] || 0;

    const isWithdrawn = MEMBER_STATUS[mid] === true;
    const statusBadge = isWithdrawn
      ? '<span class="badge badge-red">退会</span>'
      : '<span class="badge badge-green">現会員</span>';
    return `<tr>
      <td>${statusBadge}</td>
      <td><span class="member-id" onclick="goDetail('${mid}')">${mid}</span></td>
      <td class="num ${deposit > 0 ? 'positive' : ''}">${fmt(deposit)}</td>
      <td class="num">${fmt(shipping)}</td>
      <td class="num">${fmt(slcus)}</td>
      <td class="num">${fmt(customs)}</td>
      <td class="num ${colorClass(comp)}">${fmt(comp)}</td>
      <td class="num">${stock || '—'}</td>
      <td>${sparkline(m.sl, 'var(--accent)')}</td>
    </tr>`;
  }).join('');

  // Pagination
  document.getElementById('pagination-info').textContent =
    `${start + 1}〜${Math.min(start + PAGE_SIZE, total)} / ${total}名`;

  const btns = document.getElementById('pagination-btns');
  let html = '';
  if (currentMemberPage > 1) html += `<button class="page-btn" onclick="goMemberPage(${currentMemberPage-1})">‹</button>`;
  const range = 3;
  for (let p = Math.max(1, currentMemberPage - range); p <= Math.min(totalPages, currentMemberPage + range); p++) {
    html += `<button class="page-btn ${p === currentMemberPage ? 'active' : ''}" onclick="goMemberPage(${p})">${p}</button>`;
  }
  if (currentMemberPage < totalPages) html += `<button class="page-btn" onclick="goMemberPage(${currentMemberPage+1})">›</button>`;
  btns.innerHTML = html;
}

function goMemberPage(p) {
  currentMemberPage = p;
  renderMembers();
}

function filterMembers() {
  currentMemberPage = 1;
  renderMembers();
}

function sortMembers(col) {
  if (membersSorted.col === col) membersSorted.dir *= -1;
  else { membersSorted.col = col; membersSorted.dir = -1; }
  currentMemberPage = 1;
  renderMembers();
}

// ===== Detail page =====
function goDetail(mid) {
  document.getElementById('detail-input').value = mid;
  showPage('detail');
  document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('active', i === 2));
  renderDetail(mid);
}

function searchDetail() {
  const mid = document.getElementById('detail-input').value.trim();
  document.getElementById('autocomplete-list').style.display = 'none';
  if (!mid) return;
  if (!MEMBERS[mid]) {
    document.getElementById('detail-content').innerHTML =
      `<div class="error-msg">⚠️ 会員番号「${mid}」は見つかりませんでした</div>`;
    return;
  }
  renderDetail(mid);
}

function autocomplete(val) {
  const list = document.getElementById('autocomplete-list');
  if (!val || val.length < 1) { list.style.display = 'none'; return; }
  const matches = MEMBER_IDS.filter(m => m.includes(val)).slice(0, 10);
  if (!matches.length) { list.style.display = 'none'; return; }
  list.innerHTML = matches.map(m =>
    `<div class="autocomplete-item" onclick="selectMember('${m}')">${m}</div>`
  ).join('');
  list.style.display = 'block';
}

function selectMember(mid) {
  document.getElementById('detail-input').value = mid;
  document.getElementById('autocomplete-list').style.display = 'none';
  renderDetail(mid);
}

function renderDetail(mid) {
  const m = MEMBERS[mid];
  if (!m) return;
  const s = m.s;

  const totalDeposit = moSum(m.da);
  const totalShipping = moSum(m.sc);
  const totalPurchase = moSum(m.pu);
  const totalCustoms = moSum(m.cc);
  const totalSLCUS = moSum(m.sl);
  const totalPayment = moSum(m.pa);
  const totalCoupon = moSum(m.co);

  const isWithdrawn = MEMBER_STATUS[mid] === true;
  const statusLabel = isWithdrawn ? '退会者' : '現会員';
  const statusColor = isWithdrawn ? 'var(--accent5)' : 'var(--accent3)';

  const kpis = [
    { label: 'ステータス', val: statusLabel, color: statusColor },
    { label: '入金合計', val: fmt(totalDeposit), color: 'var(--accent3)' },
    { label: '配送件数', val: (s['配送件数'] || 0) + '件', color: 'var(--accent4)' },
    { label: '配送費合計', val: fmt(s['配送費']), color: 'var(--accent4)' },
    { label: '仕入総額', val: fmt(s['仕入']), color: 'var(--accent)' },
    { label: '通関件数', val: (s['通関件数'] || 0) + '件', color: 'var(--accent2)' },
    { label: '通関費合計', val: fmt(s['通関費']), color: 'var(--accent2)' },
    { label: 'SLC-US件数', val: (s['SLC件数'] || 0) + '件', color: 'var(--accent)' },
    { label: 'SLC-US費合計', val: fmt(s['SLC費']), color: 'var(--accent)' },
    { label: '在庫件数', val: (s['在庫件数'] || 0) + '件', color: 'var(--accent4)' },
    { label: '商品数量合計', val: (s['商品数'] || 0) + '個', color: 'var(--accent4)' },
    { label: '支払補償合計', val: fmt(s['補償額']), color: (s['補償額'] || 0) < 0 ? 'var(--accent5)' : 'var(--accent3)' },
    { label: 'クーポン額', val: fmt(s['クーポン額']), color: 'var(--accent3)' },
  ];

  const kpiHtml = kpis.map(k =>
    `<div class="detail-kpi-card" style="border-left:3px solid ${k.color}">
      <div class="detail-kpi-val">${k.val}</div>
      <div class="detail-kpi-label">${k.label}</div>
    </div>`
  ).join('');

  const content = document.getElementById('detail-content');
  content.className = 'fade-in';
  content.innerHTML = `
    <div class="detail-header">
      <button class="back-btn" onclick="showPage('members');document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===1))">← 一覧へ</button>
      <div class="detail-id">会員 #${mid}</div>
      <span class="badge ${isWithdrawn ? 'badge-red' : 'badge-green'}" style="font-size:13px;padding:4px 12px">${isWithdrawn ? '退会者' : '現会員'}</span>
    </div>

    <div class="section-title">基本KPI</div>
    <div class="detail-kpi">${kpiHtml}</div>

    <div class="section-title">月別推移チャート</div>
    <div class="detail-charts">
      <div class="chart-card">
        <div class="chart-title">SLC-US費 月別</div>
        <canvas id="dc-slcus" height="200"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">入金額 月別</div>
        <canvas id="dc-deposit" height="200"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">配送費 月別</div>
        <canvas id="dc-shipping" height="200"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">通関費 月別</div>
        <canvas id="dc-customs" height="200"></canvas>
      </div>
    </div>

    <div class="section-title">詳細データ（月別）</div>
    <div class="table-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>月</th>
              <th class="num">SLC-US費</th>
              <th class="num">入金額</th>
              <th class="num">配送費</th>
              <th class="num">仕入総額</th>
              <th class="num">通関費</th>
              <th class="num">在庫数量</th>
              <th class="num">支払補償</th>
              <th class="num">クーポン</th>
            </tr>
          </thead>
          <tbody>
            ${MONTHS.map((mo, i) => {
              const sl = m.sl[i], da = m.da[i], sc = m.sc[i], pu = m.pu[i],
                    cc = m.cc[i], sq = m.sq[i], pa = m.pa[i], co = m.co[i];
              const hasData = [sl,da,sc,pu,cc,sq,pa,co].some(v => v != null);
              if (!hasData) return '';
              return `<tr>
                <td style="font-family:var(--mono);color:var(--muted)">${mo}</td>
                <td class="num">${fmt(sl)}</td>
                <td class="num ${da > 0 ? 'positive' : ''}">${fmt(da)}</td>
                <td class="num">${fmt(sc)}</td>
                <td class="num">${fmt(pu)}</td>
                <td class="num">${fmt(cc)}</td>
                <td class="num">${sq != null ? sq : '—'}</td>
                <td class="num ${colorClass(pa)}">${fmt(pa)}</td>
                <td class="num">${fmt(co)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;

  loadCharts(() => {
    const opts = (color, label) => ({
      type: 'bar',
      options: {
        responsive: true,
        animation: { duration: 400 },
        plugins: { legend: { display: false }, tooltip: {
          callbacks: { label: ctx => '  ¥' + (ctx.raw||0).toLocaleString('ja-JP') }
        }},
        scales: {
          x: { grid: { color: 'rgba(31,45,69,0.6)' }, ticks: { color: '#64748b', font: { size: 9 }, maxRotation: 45 } },
          y: { grid: { color: 'rgba(31,45,69,0.6)' }, ticks: { color: '#64748b', font: { size: 9 }, callback: v => fmtCompact(v) } }
        }
      },
      data: {
        labels: MONTHS,
        datasets: [{ data: [], backgroundColor: color + '99', borderColor: color, borderWidth: 1, borderRadius: 3 }]
      }
    });

    const mk = (id, data, color) => {
      if (charts[id]) charts[id].destroy();
      const cfg = opts(color);
      cfg.data.datasets[0].data = data.map(v => v || 0);
      // Detect negative values
      const hasNeg = data.some(v => v < 0);
      if (hasNeg) {
        cfg.data.datasets[0].backgroundColor = data.map(v =>
          (v || 0) < 0 ? '#ef444499' : color + '99'
        );
        cfg.data.datasets[0].borderColor = data.map(v =>
          (v || 0) < 0 ? '#ef4444' : color
        );
      }
      charts[id] = new Chart(document.getElementById(id), cfg);
    };

    mk('dc-slcus', m.sl, '#00d4ff');
    mk('dc-deposit', m.da, '#10b981');
    mk('dc-shipping', m.sc, '#f59e0b');
    mk('dc-customs', m.cc, '#7c3aed');
  });
}

// ===== Init =====
document.addEventListener('click', e => {
  if (!e.target.closest('.input-wrap'))
    document.getElementById('autocomplete-list').style.display = 'none';
});

renderOverview();
</script>
</body>
</html>
